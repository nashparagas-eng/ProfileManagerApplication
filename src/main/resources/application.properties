spring.application.name=ProfileManagerSpringBoot

# ----------------------------------------------------------------
# Database Connection (PostgreSQL / Supabase)
# ----------------------------------------------------------------
spring.datasource.url=jdbc:postgresql://db.dociwuhaaefhdubynojg.supabase.co:5432/postgres?sslmode=require
spring.datasource.username=postgres
spring.datasource.password=y1p145n0kU71bxua
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool Settings (HikariCP)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.auto-commit=false
spring.datasource.hikari.data-source-properties.prepareThreshold=0

# ----------------------------------------------------------------
# JPA / Hibernate Settings
# ----------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.show-sql=true

# Disable Hibernate's autocommit to prevent conflicts with Hikari
spring.jpa.properties.hibernate.connection.provider_disables_autocommit=true
spring.jpa.properties.hibernate.connection.autocommit=false
spring.jpa.properties.hibernate.transaction.jta.platform=org.hibernate.engine.transaction.jta.platform.internal.NoJtaPlatform

# ----------------------------------------------------------------
# Multipart Upload Limits (Avatar File Uploads)
# ----------------------------------------------------------------
spring.servlet.multipart.max-file-size=1MB
spring.servlet.multipart.max-request-size=1MB

# ----------------------------------------------------------------
# Supabase Storage -- Avatar Bucket Credentials
